<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Taurus</title>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
    overflow: hidden;
}

/* 粒子背景 */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 0;
}

/* 內容 */
.container {
    position: relative;
    z-index: 1;
    margin-top: 80px;
}

h1 {
    font-size: 60px;
    letter-spacing: 6px;
}

/* 圖片外框（正方形容器） */
.logo-box {
    width: 280px;
    height: 280px;
    margin: 40px auto;
    border-radius: 40px;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(255,255,255,0.4);
}

/* 圖片本身 */
.logo-box img {
    width: 100%;
    height: 100%;
    object-fit: cover; /* 重要：裁切不變形 */
}

/* 按鈕 */
button {
    padding: 18px 50px;
    font-size: 20px;
    background: white;
    color: black;
    border: none;
    border-radius: 40px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #ccc;
    transform: scale(1.08);
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="container">
    <h1>Taurus</h1>

    <div class="logo-box">
        <img src="taurus.png">
    </div>

    <button onclick="window.location.href='https://google.com'">
        Enter
    </button>
</div>

<script>
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 100; i++) {
    particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 2,
        speedY: Math.random() * 0.4
    });
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "rgba(255,255,255,0.4)";
    particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();

        p.y += p.speedY;
        if (p.y > canvas.height) {
            p.y = 0;
            p.x = Math.random() * canvas.width;
        }
    });

    requestAnimationFrame(animate);
}

animate();

window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>

</body>
</html>
