<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Taurus</title>
  <style>
    @font-face {
      font-family: "Inter";
      src: local("Inter");
      font-display: swap;
    }
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html, body { height: 100%; background: #000; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Noto Sans", "PingFang TC", "Microsoft JhengHei", sans-serif;
      color: #fff;
      display: grid;
      place-items: center;
      overflow: hidden;
    }
    #bg, #taurus {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
    }
    #bg { opacity: .65; }
    #taurus { opacity: .9; }
    .ui {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 24px;
    }
    h1 {
      margin: 0 0 16px;
      font-size: clamp(32px, 6vw, 64px);
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    button {
      appearance: none;
      border: 1px solid rgba(255,255,255,.15);
      background: linear-gradient(135deg, #22d3ee 0%, #7c3aed 50%, #f59e0b 100%);
      background-size: 200% 200%;
      color: #fff;
      padding: 12px 20px;
      font-size: 16px;
      border-radius: 10px;
      cursor: pointer;
      transition: transform .15s ease, filter .15s ease, border-color .15s ease;
      animation: btnGradient 8s ease infinite;
      box-shadow: 0 8px 20px rgba(124,58,237,.25);
    }
    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.12);
      border-color: rgba(255,255,255,.35);
    }
    button:active { transform: translateY(0); }
    @keyframes btnGradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
  </style>
</head>
<body>
  <canvas id="bg"></canvas>
  <canvas id="taurus"></canvas>
  <div class="ui">
    <h1>Taurus</h1>
    <button id="go">前往</button>
  </div>
  <script>
    const TARGET_URL = "https://www.example.com";
    const dpr = Math.max(1, window.devicePixelRatio || 1);
    const bgCanvas = document.getElementById("bg");
    const taurusCanvas = document.getElementById("taurus");
    const goBtn = document.getElementById("go");
    function sizeCanvas(c) {
      const w = window.innerWidth;
      const h = window.innerHeight;
      c.width = Math.floor(w * dpr);
      c.height = Math.floor(h * dpr);
      c.style.width = w + "px";
      c.style.height = h + "px";
    }
    sizeCanvas(bgCanvas);
    sizeCanvas(taurusCanvas);
    window.addEventListener("resize", () => {
      sizeCanvas(bgCanvas);
      sizeCanvas(taurusCanvas);
      initBackground();
      initTaurus();
    });
    goBtn.addEventListener("click", () => {
      window.location.href = TARGET_URL;
    });
    let bgParticles = [];
    function initBackground() {
      const w = bgCanvas.width;
      const h = bgCanvas.height;
      const area = w * h;
      const count = Math.max(200, Math.min(600, Math.floor(area / (9000 * dpr))));
      bgParticles = Array.from({ length: count }, () => {
        const speed = 0.07 + Math.random() * 0.16;
        return {
          x: Math.random() * w,
          y: Math.random() * h,
          vx: (Math.random() - 0.5) * speed * dpr,
          vy: (Math.random() - 0.5) * speed * dpr,
          r: 0.8 * dpr + Math.random() * (1.8 * dpr),
          a: 0.35 + Math.random() * 0.35
        };
      });
    }
    initBackground();
    function drawBackground(ctx) {
      ctx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
      for (let p of bgParticles) {
        p.x += p.vx;
        p.y += p.vy;
        if (p.x < 0) p.x = bgCanvas.width;
        if (p.x > bgCanvas.width) p.x = 0;
        if (p.y < 0) p.y = bgCanvas.height;
        if (p.y > bgCanvas.height) p.y = 0;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${p.a})`;
        ctx.fill();
      }
    }
    let taurusPoints = [];
    function sampleCircle(cx, cy, r, n) {
      const pts = [];
      for (let i = 0; i < n; i++) {
        const t = (i / n) * Math.PI * 2;
        pts.push([cx + Math.cos(t) * r, cy + Math.sin(t) * r]);
      }
      return pts;
    }
    function sampleArc(cx, cy, rx, ry, startRad, endRad, n) {
      const pts = [];
      for (let i = 0; i <= n; i++) {
        const t = startRad + (endRad - startRad) * (i / n);
        pts.push([cx + Math.cos(t) * rx, cy + Math.sin(t) * ry]);
      }
      return pts;
    }
    function normalCircle(x, y, cx, cy, r) {
      const nx = x - cx;
      const ny = y - cy;
      const len = Math.hypot(nx, ny) || 1;
      return { x: nx / len, y: ny / len };
    }
    function normalEllipse(x, y, cx, cy, rx, ry) {
      let nx = (x - cx) / (rx * rx);
      let ny = (y - cy) / (ry * ry);
      const len = Math.hypot(nx, ny) || 1;
      return { x: nx / len, y: ny / len };
    }
    function thickenSegment(points, calcNormal, offsets) {
      const thick = [];
      for (let i = 0; i < points.length; i++) {
        const [x, y] = points[i];
        const n = calcNormal(x, y);
        for (let o of offsets) {
          thick.push([x + n.x * o, y + n.y * o]);
        }
      }
      return thick;
    }
    function initTaurus() {
      const w = taurusCanvas.width;
      const h = taurusCanvas.height;
      const cx = w / 2;
      const cy = h / 2 + 24 * dpr;
      const base = Math.min(w, h) * 0.18;
      const circleR = base;
      const circlePts = sampleCircle(cx, cy, circleR, Math.floor(360 * dpr));
      const hornOffsetY = cy - circleR * 0.9;
      const leftHornCx = cx - circleR * 0.8;
      const rightHornCx = cx + circleR * 0.8;
      const hornRx = circleR * 0.85;
      const hornRy = circleR * 0.55;
      const leftHorn = sampleArc(leftHornCx, hornOffsetY, hornRx, hornRy, Math.PI * 0.55, Math.PI * 1.15, Math.floor(160 * dpr));
      const rightHorn = sampleArc(rightHornCx, hornOffsetY, hornRx, hornRy, Math.PI * -0.15, Math.PI * 0.45, Math.floor(160 * dpr));
      const offsets = [0, 1.6 * dpr, -1.6 * dpr];
      const thickCircle = thickenSegment(circlePts, (x, y) => normalCircle(x, y, cx, cy, circleR), offsets);
      const thickLeft = thickenSegment(leftHorn, (x, y) => normalEllipse(x, y, leftHornCx, hornOffsetY, hornRx, hornRy), offsets);
      const thickRight = thickenSegment(rightHorn, (x, y) => normalEllipse(x, y, rightHornCx, hornOffsetY, hornRx, hornRy), offsets);
      const pts = thickCircle.concat(thickLeft).concat(thickRight);
      taurusPoints = pts.map(([x, y]) => ({
        x,
        y,
        tx: x,
        ty: y,
        vx: 0,
        vy: 0,
        baseR: 1.9 * dpr + Math.random() * (1.3 * dpr),
        a0: 0.6 + Math.random() * 0.25,
        f: Math.random() * Math.PI * 2,
        s: 0.6 + Math.random() * 1.4,
        scatterT: 0,
        reform: 1
      }));
    }
    initTaurus();
    const mouse = { x: 0, y: 0, inside: false };
    taurusCanvas.addEventListener("mousemove", (e) => {
      const rect = taurusCanvas.getBoundingClientRect();
      mouse.x = (e.clientX - rect.left) * dpr;
      mouse.y = (e.clientY - rect.top) * dpr;
      mouse.inside = true;
      const thresh = 120 * dpr;
      for (let p of taurusPoints) {
        const dx = p.x - mouse.x;
        const dy = p.y - mouse.y;
        const dist = Math.hypot(dx, dy);
        if (dist < thresh) {
          const force = ((thresh - dist) / thresh) * (3.2 * dpr);
          const nx = dx / (dist || 1);
          const ny = dy / (dist || 1);
          p.vx += nx * force + (Math.random() - 0.5) * 0.4 * dpr;
          p.vy += ny * force + (Math.random() - 0.5) * 0.4 * dpr;
          p.scatterT = 2000;
          p.reform = 0;
        }
      }
    });
    taurusCanvas.addEventListener("mouseleave", () => {
      mouse.inside = false;
    });
    function drawTaurus(ctx, t, dt) {
      ctx.clearRect(0, 0, taurusCanvas.width, taurusCanvas.height);
      for (let p of taurusPoints) {
        if (p.scatterT > 0) {
          p.vx *= 0.985;
          p.vy *= 0.985;
          p.x += p.vx;
          p.y += p.vy;
          p.scatterT -= dt;
        } else {
          p.reform = Math.min(1, p.reform + dt / 2400);
          const k = 0.012 * (0.2 + 0.8 * p.reform);
          p.vx += (p.tx - p.x) * k;
          p.vy += (p.ty - p.y) * k;
          p.vx *= 0.94;
          p.vy *= 0.94;
          p.x += p.vx;
          p.y += p.vy;
          const dtx = p.tx - p.x;
          const dty = p.ty - p.y;
          const d = Math.hypot(dtx, dty);
          if (d < 1.2 * dpr) {
            p.vx *= 0.6;
            p.vy *= 0.6;
          }
        }
        if (p.x < 0) p.x = taurusCanvas.width;
        if (p.x > taurusCanvas.width) p.x = 0;
        if (p.y < 0) p.y = taurusCanvas.height;
        if (p.y > taurusCanvas.height) p.y = 0;
        const pulse = 0.85 + 0.3 * Math.sin(t * 0.002 * p.s + p.f);
        const r = Math.max(0.5 * dpr, p.baseR * pulse);
        const a = p.a0 * (0.7 + 0.3 * Math.sin(t * 0.001 * p.s + p.f));
        ctx.beginPath();
        ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${a})`;
        ctx.fill();
      }
    }
    const bgCtx = bgCanvas.getContext("2d");
    const taurusCtx = taurusCanvas.getContext("2d");
    let lastTs = 0;
    function frame(ts) {
      const dt = lastTs ? ts - lastTs : 16;
      lastTs = ts;
      drawBackground(bgCtx);
      drawTaurus(taurusCtx, ts, dt);
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  </script>
</body>
</html>
